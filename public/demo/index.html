                </div>

                <div>
                  <label style={labelStyle}>Division</label>
                  <input style={inputStyle} value={division} onChange={function(e) { setDivision(e.target.value); }} placeholder="e.g. 11-13, Varsity, U12" />
                  <div style={{ fontSize: 11, color: "var(--color-text-tertiary)", marginTop: 4 }}>Shown in the board header subtitle alongside league name and season.</div>
                </div>

                <div>
                  <label style={labelStyle}>Header Color</label>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <input type="color" value={headerColor} onChange={function(e) { setHeaderColor(e.target.value); }} style={{ width: 44, height: 36, border: "1px solid var(--color-border-secondary)", borderRadius: 7, cursor: "pointer", padding: 2 }} />
                    <input style={Object.assign({}, inputStyle, { flex: 1 })} value={headerColor} onChange={function(e) { setHeaderColor(e.target.value); }} placeholder="#1e1b4b" />
                    <div style={{ width: 36, height: 36, borderRadius: 7, background: headerGradient(), border: "1px solid var(--color-border-tertiary)" }} title="Gradient preview" />
                  </div>
                  <div style={{ fontSize: 11, color: "var(--color-text-tertiary)", marginTop: 4 }}>Gradient is auto-generated from this color.</div>
                </div>

              </div>
            </div>
          )}

          {/* ── Teams ── */}
          {section === "teams" && (
            <div style={{ maxWidth: 760 }}>

              {/* Snake vs straight toggle */}
              <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 20, padding: "12px 16px", background: "var(--color-background-secondary)", borderRadius: 10, border: "1px solid var(--color-border-tertiary)" }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: "var(--color-text-primary)" }}>Draft Order:</div>
                <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer" }}>
                  <div onClick={function() { setSnakeDraft(true); }} style={{ padding: "5px 14px", borderRadius: 6, border: "2px solid " + (snakeDraft ? "#4338ca" : "var(--color-border-secondary)"), background: snakeDraft ? "#eef2ff" : "#fff", fontSize: 12, fontWeight: snakeDraft ? 700 : 500, color: snakeDraft ? "#4338ca" : "#6b7280", cursor: "pointer" }}>🐍 Snake</div>
                  <div onClick={function() { setSnakeDraft(false); }} style={{ padding: "5px 14px", borderRadius: 6, border: "2px solid " + (!snakeDraft ? "#4338ca" : "var(--color-border-secondary)"), background: !snakeDraft ? "#eef2ff" : "#fff", fontSize: 12, fontWeight: !snakeDraft ? 700 : 500, color: !snakeDraft ? "#4338ca" : "#6b7280", cursor: "pointer" }}>➡️ Straight</div>
                </label>
                <div style={{ fontSize: 11, color: "var(--color-text-tertiary)" }}>{snakeDraft ? "Odd rounds: A→Z · Even rounds: Z→A" : "Every round: A→Z"}</div>
              </div>
              <div>
                <label style={labelStyle}>Number of Rounds</label>
                <input type="number" min="1" max="30" style={Object.assign({}, inputStyle, { width: 80 })} value={numRounds} onChange={function(e) { setNumRounds(Math.max(1, parseInt(e.target.value) || 1)); }} />
                <div style={{ fontSize: 11, color: "var(--color-text-tertiary)", marginTop: 4 }}>Controls round count in Pick Order, draft slots, and pre-assigned round dropdown.</div>
              </div>

              {/* Round 1 order note */}
              <div style={{ fontSize: 12, color: "var(--color-text-tertiary)", marginBottom: 10 }}>
                Round 1 pick order follows the team sequence below. Use ↑ ↓ to reorder.
              </div>

              <div style={{ display: "grid", gap: 10 }}>
                {teams.map(function(team, idx) {
                  var letter = "ABCDEFGHIJKLMNOPQRSTUVWXYZ"[idx];
                  return (
                    <div key={idx} style={{ border: "1px solid var(--color-border-tertiary)", borderRadius: 10, padding: "12px 14px", background: "var(--color-background-secondary)", display: "grid", gridTemplateColumns: "28px 28px 1fr 1fr 160px 44px 36px", gap: 8, alignItems: "center" }}>
                      {/* Up/down */}
                      <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
                        <button onClick={function() { moveTeam(idx, -1); }} disabled={idx === 0} style={{ padding: "1px 4px", border: "1px solid var(--color-border-tertiary)", borderRadius: 4, background: "var(--color-background-primary)", color: "var(--color-text-primary)", fontSize: 10, cursor: idx === 0 ? "not-allowed" : "pointer", opacity: idx === 0 ? 0.3 : 1 }}>▲</button>
                        <button onClick={function() { moveTeam(idx, 1); }} disabled={idx === teams.length - 1} style={{ padding: "1px 4px", border: "1px solid var(--color-border-tertiary)", borderRadius: 4, background: "var(--color-background-primary)", color: "var(--color-text-primary)", fontSize: 10, cursor: idx === teams.length - 1 ? "not-allowed" : "pointer", opacity: idx === teams.length - 1 ? 0.3 : 1 }}>▼</button>
                      </div>
                      {/* Letter badge */}
                      <div style={{ width: 26, height: 26, borderRadius: 6, background: team.color, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 800, color: "#fff" }}>{letter}</div>
                      {/* Team name */}
                      <div>
                        <label style={Object.assign({}, labelStyle, { marginBottom: 2 })}>Team Name</label>
                        <input style={inputStyle} value={team.name} onChange={function(e) { updateTeam(idx, "name", e.target.value); }} placeholder="Team name" />
                      </div>
                      {/* Coaches */}
                      <div>
                        <label style={Object.assign({}, labelStyle, { marginBottom: 2 })}>Coach(es)</label>
                        <input style={inputStyle} value={team.coaches} onChange={function(e) { updateTeam(idx, "coaches", e.target.value); }} placeholder="Coach names" />
                      </div>
                      {/* Color */}
                      <div>
                        <label style={Object.assign({}, labelStyle, { marginBottom: 2 })}>Color</label>
                        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          <input type="color" value={team.color} onChange={function(e) { updateTeam(idx, "color", e.target.value); }} style={{ width: 32, height: 28, border: "1px solid var(--color-border-secondary)", borderRadius: 5, cursor: "pointer", padding: 2, flexShrink: 0 }} />
                          <input style={Object.assign({}, inputStyle, { flex: 1 })} value={team.color} onChange={function(e) { updateTeam(idx, "color", e.target.value); }} placeholder="#000000" />
                        </div>
                      </div>
                      {/* Remove */}
                      <div style={{ textAlign: "center" }}>
                        <button onClick={function() { removeTeam(idx); }} disabled={teams.length <= 2} style={{ padding: "6px 8px", border: "1px solid var(--color-border-secondary)", borderRadius: 6, background: "var(--color-surface-danger)", color: "#dc2626", fontSize: 12, cursor: teams.length <= 2 ? "not-allowed" : "pointer", opacity: teams.length <= 2 ? 0.4 : 1 }}>✕</button>
                      </div>
                    </div>
                  );
                })}
              </div>
              {teams.length < 12 && (
                <button onClick={addTeam} style={{ marginTop: 12, padding: "8px 16px", border: "2px dashed #d1d5db", borderRadius: 8, background: "transparent", fontSize: 13, fontWeight: 600, color: "var(--color-text-tertiary)", cursor: "pointer", width: "100%" }}>+ Add Team</button>
              )}
              <div style={{ marginTop: 14, padding: "10px 14px", background: "var(--color-surface-info)", borderRadius: 8, fontSize: 12, color: "var(--color-text-primary)", border: "1px solid #bae6fd" }}>
                💡 Min 2 teams, max 12. Team IDs (A, B, C…) are assigned by position. Top row picks first in Round 1.
              </div>
            </div>
          )}

          {/* ── Schedule ── */}
          {section === "schedule" && (
            <div style={{ maxWidth: 560 }}>
              <div style={{ fontSize: 13, color: "var(--color-text-secondary)", marginBottom: 16 }}>
                These dates appear in the board header info panel and the welcome email generator.
              </div>
              <div style={{ display: "grid", gap: 8 }}>
                {schedule.map(function(row, idx) {
                  return (
                    <div key={idx} style={{ display: "grid", gridTemplateColumns: "1fr 1fr 36px", gap: 8, alignItems: "center" }}>
                      <input style={inputStyle} value={row.label} onChange={function(e) { updateScheduleRow(idx, "label", e.target.value); }} placeholder="Label (e.g. Opening Day)" />
                      <input type="date" style={inputStyle} value={row.date} onChange={function(e) { updateScheduleRow(idx, "date", e.target.value); }} />
                      <button onClick={function() { removeScheduleRow(idx); }} style={{ padding: "7px 8px", border: "1px solid var(--color-border-secondary)", borderRadius: 6, background: "var(--color-surface-danger)", color: "#dc2626", fontSize: 12, cursor: "pointer" }}>✕</button>
                    </div>
                  );
                })}
              </div>
              <button onClick={addScheduleRow} style={{ marginTop: 12, padding: "8px 16px", border: "2px dashed #d1d5db", borderRadius: 8, background: "transparent", fontSize: 13, fontWeight: 600, color: "var(--color-text-tertiary)", cursor: "pointer", width: "100%" }}>+ Add Row</button>
              <div style={{ marginTop: 14, padding: "10px 14px", background: "var(--color-surface-info)", borderRadius: 8, fontSize: 12, color: "var(--color-text-primary)", border: "1px solid #bae6fd" }}>
                💡 Label is free text. Rows with empty labels are hidden from the board display.
              </div>
            </div>
          )}

          {/* ── Eval Stations ── */}
          {section === "evals" && (
            <div style={{ maxWidth: 520 }}>
              <div style={{ marginBottom: 16, fontSize: 13, color: "var(--color-text-secondary)" }}>Define the 5 evaluation stations for your sport. The 0–5 scale is fixed.</div>
              <div style={{ display: "grid", gap: 10 }}>
                {evalStations.map(function(station, idx) {
                  return (
                    <div key={idx} style={{ display: "grid", gridTemplateColumns: "24px 1fr auto", gap: 10, alignItems: "center" }}>
                      <div style={{ fontSize: 12, fontWeight: 700, color: "var(--color-text-tertiary)", textAlign: "center" }}>{idx + 1}</div>
                      <input style={inputStyle} value={station} onChange={function(e) { setEvalStations(function(ss) { return ss.map(function(s, i) { return i === idx ? e.target.value : s; }); }); }} placeholder={"Station " + (idx + 1)} />
                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <input type="radio" id={"priority-" + idx} name="priority" checked={priorityStation === idx} onChange={function() { setPriorityStation(idx); }} style={{ cursor: "pointer" }} />
                        <label htmlFor={"priority-" + idx} style={{ fontSize: 12, color: priorityStation === idx ? "#d97706" : "#6b7280", fontWeight: priorityStation === idx ? 700 : 400, cursor: "pointer", whiteSpace: "nowrap" }}>
                          {priorityStation === idx ? "⭐ Priority" : "Priority?"}
                        </label>
                      </div>
                    </div>
                  );
                })}
              </div>
              <div style={{ marginTop: 20, padding: "12px 16px", background: "var(--color-surface-amber)", borderRadius: 8, fontSize: 12, color: "var(--color-text-primary)", border: "1px solid var(--color-border-secondary)" }}>
                ⭐ The <strong>Priority Station</strong> drives the NBA Phase 1 recommendation — players scoring 4+ are flagged as priority picks and shown with an amber border until your team has 2.
              </div>
            </div>
          )}

          {/* ── Positions ── */}
          {section === "positions" && (
            <div style={{ maxWidth: 520 }}>
              <div style={{ marginBottom: 16, fontSize: 13, color: "var(--color-text-secondary)" }}>Define the position tags available for your sport. These appear as buttons on every player card for scouting assignment.</div>

              {/* Current positions list */}
              <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 20 }}>
                {cfgPositionsList.map(function(pos, idx) {
                  return (
                    <div key={idx} style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
                        <button disabled={idx === 0} onClick={function() { setCfgPositionsList(function(arr) { var n = arr.slice(); var tmp = n[idx-1]; n[idx-1] = n[idx]; n[idx] = tmp; return n; }); }} style={{ padding: "1px 6px", fontSize: 10, border: "1px solid var(--color-border-secondary)", borderRadius: 3, background: idx === 0 ? "var(--color-background-secondary)" : "var(--color-background-primary)", color: idx === 0 ? "var(--color-border-secondary)" : "var(--color-text-secondary)", cursor: idx === 0 ? "default" : "pointer", lineHeight: 1.4 }}>▲</button>
                        <button disabled={idx === cfgPositionsList.length - 1} onClick={function() { setCfgPositionsList(function(arr) { var n = arr.slice(); var tmp = n[idx+1]; n[idx+1] = n[idx]; n[idx] = tmp; return n; }); }} style={{ padding: "1px 6px", fontSize: 10, border: "1px solid var(--color-border-secondary)", borderRadius: 3, background: idx === cfgPositionsList.length - 1 ? "#f9fafb" : "#fff", color: idx === cfgPositionsList.length - 1 ? "var(--color-border-secondary)" : "var(--color-text-secondary)", cursor: idx === cfgPositionsList.length - 1 ? "default" : "pointer", lineHeight: 1.4 }}>▼</button>
                      </div>
                      <div style={{ flex: 1, padding: "6px 10px", background: "var(--color-background-secondary)", borderRadius: 6, fontSize: 13, fontWeight: 700, color: "var(--color-text-primary)" }}>{pos}</div>
                      <button onClick={function() { var removed = cfgPositionsList[idx]; setCfgPositionsList(function(arr) { return arr.filter(function(_, i) { return i !== idx; }); }); if (onPositionRemoved) onPositionRemoved(removed); }} style={{ padding: "4px 8px", fontSize: 12, border: "1px solid var(--color-border-secondary)", borderRadius: 5, background: "var(--color-surface-danger)", color: "#dc2626", cursor: "pointer", fontWeight: 700 }}>✕</button>
                    </div>
                  );
                })}
              </div>

              {/* Add new position */}
              <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
                <input
                  style={Object.assign({}, inputStyle, { flex: 1 })}
                  placeholder="Add position (e.g. PG, WR, GK)"
                  value={newPositionInput}
                  maxLength={10}
                  onChange={function(e) { setNewPositionInput(e.target.value.toUpperCase()); }}
                  onKeyDown={function(e) {
                    if (e.key === "Enter" && newPositionInput.trim() && !cfgPositionsList.includes(newPositionInput.trim())) {
                      setCfgPositionsList(function(arr) { return arr.concat(newPositionInput.trim()); });
                      setNewPositionInput("");
                    }
                  }}
                />
                <button
                  disabled={!newPositionInput.trim() || cfgPositionsList.includes(newPositionInput.trim())}
                  onClick={function() {
                    if (newPositionInput.trim() && !cfgPositionsList.includes(newPositionInput.trim())) {
                      setCfgPositionsList(function(arr) { return arr.concat(newPositionInput.trim()); });
                      setNewPositionInput("");
                    }
                  }}
                  style={{ padding: "8px 16px", border: "none", borderRadius: 7, fontSize: 13, fontWeight: 700, cursor: (!newPositionInput.trim() || cfgPositionsList.includes(newPositionInput.trim())) ? "not-allowed" : "pointer", background: (!newPositionInput.trim() || cfgPositionsList.includes(newPositionInput.trim())) ? "#9ca3af" : "#4338ca", color: "#fff", whiteSpace: "nowrap" }}>
                  + Add
                </button>
              </div>

              {/* Reset to default */}
              <button onClick={function() { setCfgPositionsList(["P","C","1B","2B","3B","SS","LF","CF","RF","OF"]); }} style={{ padding: "7px 14px", border: "1px solid var(--color-border-secondary)", borderRadius: 7, fontSize: 12, fontWeight: 600, background: "var(--color-background-primary)", color: "var(--color-text-secondary)", cursor: "pointer" }}>
                ↺ Reset to softball defaults
              </button>
            </div>
          )}

          {/* ── Players ── */}
          {section === "players" && (
            <div>
              {/* CSV import */}
              <div style={{ marginBottom: 16, padding: "14px 16px", border: "1px solid var(--color-border-tertiary)", borderRadius: 10, background: "var(--color-background-secondary)" }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: "var(--color-text-primary)", marginBottom: 8 }}>📂 CSV Import</div>
                <div style={{ fontSize: 12, color: "var(--color-text-tertiary)", marginBottom: 10 }}>
                  <div style={{ marginBottom: 6 }}>
                    Required: <code>FirstName</code>, <code>LastName</code>. Optional: <code>Age</code>, <code>S1</code>–<code>S5</code> (current scores), <code>PS1</code>–<code>PS5</code> (prior season scores), <code>PreAssigned</code> (team letter A–{String.fromCharCode(64 + teams.length)}), <code>Round</code> (pre-assigned draft round).
                    Station name columns also accepted (e.g. <code>{evalStations[0]}</code> instead of <code>S1</code>).
                  </div>
                  <div style={{ fontFamily: "monospace", background: "var(--color-background-secondary)", padding: "6px 10px", borderRadius: 5, fontSize: 11, color: "var(--color-text-secondary)" }}>
                    <div style={{ fontWeight: 700, marginBottom: 2 }}>S1={evalStations[0]}, S2={evalStations[1]}, S3={evalStations[2]}, S4={evalStations[3]}, S5={evalStations[4]}</div>
                    FirstName,LastName,Age,S1,S2,S3,S4,S5,PS1,PS2,PS3,PS4,PS5,PreAssigned,Round<br/>
                    Lisa,Simpson,12,4.5,5,4,4.5,5,3,5,3,4,4,A,1
                  </div>
                </div>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  <label style={{ padding: "7px 14px", borderRadius: 7, border: "1px solid var(--color-border-secondary)", background: "var(--color-background-primary)", fontSize: 12, fontWeight: 600, color: "var(--color-text-secondary)", cursor: "pointer" }}>
                    📁 Upload CSV
                    <input type="file" accept=".csv,.txt" onChange={handleCSVFile} style={{ display: "none" }} />
                  </label>
                  <button onClick={function() { var text = window.prompt("Paste CSV text here:"); if (text) handleCSVPaste(text); }} style={{ padding: "7px 14px", borderRadius: 7, border: "1px solid var(--color-border-secondary)", background: "var(--color-background-primary)", fontSize: 12, fontWeight: 600, color: "var(--color-text-secondary)", cursor: "pointer" }}>📋 Paste CSV</button>
                  <button onClick={function() {
                    var headers = ["FirstName","LastName","Age"].concat(evalStations.map(function(s,i) { return s || ("S"+(i+1)); })).concat(["PS1","PS2","PS3","PS4","PS5","PreAssigned","Round"]);
                    var example = ["Lisa","Simpson","12"].concat(evalStations.map(function() { return "0"; })).concat(["","","","","","",""]);
                    var csv = headers.join(",") + "\n" + example.join(",");
                    var blob = new Blob([csv], { type: "text/csv" });
                    var url = URL.createObjectURL(blob);
                    var a = document.createElement("a");
                    a.href = url; a.download = "player_import_template.csv"; a.click();
                    URL.revokeObjectURL(url);
                  }} style={{ padding: "7px 14px", borderRadius: 7, border: "1px solid var(--color-border-secondary)", background: "var(--color-background-primary)", fontSize: 12, fontWeight: 600, color: "var(--color-text-secondary)", cursor: "pointer" }}>⬇ Download Template</button>
                </div>
                {csvError && <div style={{ marginTop: 8, fontSize: 12, color: "#dc2626" }}>{csvError}</div>}
                {importPreview && (
                  <div style={{ marginTop: 10, padding: "10px 12px", background: "var(--color-surface-success)", border: "1px solid #86efac", borderRadius: 8 }}>
                    <div style={{ fontSize: 12, color: "var(--color-text-primary)", fontWeight: 700, marginBottom: 6 }}>✅ Preview: {importPreview.length} players parsed</div>
                    <div style={{ fontSize: 11, color: "var(--color-text-primary)", maxHeight: 80, overflowY: "auto" }}>
                      {importPreview.slice(0, 5).map(function(p, i) { return <div key={i}>{p.name} | Age: {p.age || "—"} | Scores: {p.s0},{p.s1},{p.s2},{p.s3},{p.s4} | Pre: {p.preAssigned || "—"}</div>; })}
                      {importPreview.length > 5 && <div>...and {importPreview.length - 5} more</div>}
                    </div>
                    <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
                      <button onClick={confirmImport} style={{ padding: "5px 12px", borderRadius: 6, border: "none", background: "#16a34a", color: "#fff", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>✅ Replace All Players</button>
                      <button onClick={function() { setImportPreview(null); }} style={{ padding: "5px 12px", borderRadius: 6, border: "1px solid var(--color-border-secondary)", background: "var(--color-background-primary)", fontSize: 12, color: "var(--color-text-secondary)", cursor: "pointer" }}>Cancel</button>
                    </div>
                  </div>
                )}
              </div>

              {/* Player count summary */}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: "var(--color-text-primary)" }}>
                  {players.length} players &nbsp;·&nbsp; {teams.length} teams &nbsp;·&nbsp; {numRounds} rounds
                </div>
                <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  {players.length > 0 && (
                    showClearConfirm
                      ? <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                          <span style={{ fontSize: 12, color: "#dc2626", fontWeight: 600 }}>Clear all {players.length} players?</span>
                          <button onClick={function() { setPlayers([]); setShowClearConfirm(false); }} style={{ padding: "5px 12px", borderRadius: 6, border: "none", background: "#dc2626", color: "#fff", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>Yes, Clear</button>
                          <button onClick={function() { setShowClearConfirm(false); }} style={{ padding: "5px 12px", borderRadius: 6, border: "1px solid var(--color-border-secondary)", background: "var(--color-background-primary)", fontSize: 12, color: "var(--color-text-secondary)", cursor: "pointer" }}>Cancel</button>
                        </div>
                      : <button onClick={function() { setShowClearConfirm(true); }} style={{ padding: "6px 14px", borderRadius: 7, border: "1px solid var(--color-border-secondary)", background: "var(--color-surface-danger)", fontSize: 12, fontWeight: 600, color: "var(--color-text-primary)", cursor: "pointer" }}>🗑 Clear All</button>
                  )}
                  <button onClick={addPlayer} style={{ padding: "6px 14px", borderRadius: 7, border: "1px solid var(--color-border-secondary)", background: "var(--color-background-primary)", fontSize: 12, fontWeight: 600, color: "var(--color-text-secondary)", cursor: "pointer" }}>+ Add Player</button>
                </div>
              </div>

              {/* Player table */}
              {players.length > 0 ? (
                <div style={{ overflowX: "auto" }}>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                    <thead>
                      <tr style={{ background: "var(--color-background-secondary)" }}>
                        <th style={{ padding: "7px 4px", textAlign: "center", fontWeight: 700, color: "var(--color-text-tertiary)", fontSize: 11, borderBottom: "1px solid var(--color-border-tertiary)", width: 24 }}></th>
                        {[["name","Name","left"],["age","Age","left"]].map(function(col) {
                          var active = sortCol === col[0];
                          return <th key={col[0]} onClick={function() { handleSort(col[0]); }} style={{ padding: "7px 8px", textAlign: col[2], fontWeight: 700, color: active ? "#0369a1" : "var(--color-text-tertiary)", fontSize: 11, whiteSpace: "nowrap", borderBottom: "1px solid var(--color-border-tertiary)", cursor: "pointer", userSelect: "none" }}>{col[1]}{active ? (sortDir === "asc" ? " ▲" : " ▼") : " ⇅"}</th>;
                        })}
                        {evalStations.map(function(s, i) {
                          var col = "s" + (i + 1);
                          var active = sortCol === col;
                          return <th key={i} onClick={function() { handleSort(col); }} style={{ padding: "7px 8px", textAlign: "center", fontWeight: 700, color: active ? "#0369a1" : (i === priorityStation ? "#d97706" : "#6b7280"), fontSize: 11, whiteSpace: "nowrap", borderBottom: "1px solid var(--color-border-tertiary)", cursor: "pointer", userSelect: "none" }}>{s}{i === priorityStation ? " ⭐" : ""}{active ? (sortDir === "asc" ? " ▲" : " ▼") : " ⇅"}</th>;
                        })}
                        {[["pre","Pre-Assigned"],["round","Round"],["pending","Pending"]].map(function(col) {
                          var active = sortCol === col[0];
                          return <th key={col[0]} onClick={function() { handleSort(col[0]); }} style={{ padding: "7px 8px", textAlign: "center", fontWeight: 700, color: active ? "#0369a1" : "var(--color-text-tertiary)", fontSize: 11, whiteSpace: "nowrap", borderBottom: "1px solid var(--color-border-tertiary)", cursor: "pointer", userSelect: "none" }}>{col[1]}{active ? (sortDir === "asc" ? " ▲" : " ▼") : " ⇅"}</th>;
                        })}
                        <th style={{ padding: "7px 8px", borderBottom: "1px solid var(--color-border-tertiary)" }}></th>
                      </tr>
                    </thead>
                    <tbody>
                      {sortedPlayers.map(function(p, sortedIdx) {
                        var isExpanded = !!p.expanded;
                        var rowBg = sortedIdx % 2 === 0 ? "var(--color-background-primary)" : "var(--color-background-secondary)";
                        var cellStyle = { padding: "4px 4px" };
                        var editStyle = { width: "100%", padding: "4px 6px", border: "1px solid var(--color-border-tertiary)", borderRadius: 5, fontSize: 12, outline: "none", background: "var(--color-background-primary)", boxSizing: "border-box", color: "var(--color-text-primary)" };
                        var numStyle = Object.assign({}, editStyle, { textAlign: "center", width: 52 });
                        var psStyle = Object.assign({}, numStyle, { background: "var(--color-surface-info)", borderColor: "var(--color-border-secondary)" });
                        // Check if any prior scores entered
                        var hasPrior = ["ps1","ps2","ps3","ps4","ps5"].some(function(k) { return p[k] !== "" && p[k] !== undefined && p[k] !== null; });
                        return (
                          <React.Fragment key={p.id}>
                            {/* Main row */}
                            <tr style={{ background: rowBg, borderBottom: isExpanded ? "none" : "1px solid #f3f4f6" }}>
                              <td style={{ padding: "4px 4px", textAlign: "center" }}>
                                <button onClick={function() { updatePlayer(p.id, "expanded", !isExpanded); }} title={isExpanded ? "Hide prior scores" : "Add prior scores"} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 12, color: hasPrior ? "#0369a1" : "#9ca3af", padding: 2 }}>{isExpanded ? "▼" : "▶"}</button>
                              </td>
                              <td style={cellStyle}><input style={Object.assign({}, editStyle, { minWidth: 140 })} value={p.name} onChange={function(e) { updatePlayer(p.id, "name", e.target.value); }} placeholder="Last, First" /></td>
                              <td style={cellStyle}><input style={Object.assign({}, editStyle, { width: 60 })} value={p.age} onChange={function(e) { updatePlayer(p.id, "age", e.target.value); }} placeholder="12" /></td>
                              {["s1","s2","s3","s4","s5"].map(function(sk) {
                                var isPending = !!p.pendingEval;
                                return <td key={sk} style={Object.assign({}, cellStyle, { textAlign: "center" })}><input type="number" style={Object.assign({}, numStyle, isPending ? { opacity: 0.35 } : {})} min="0" max="5" step="0.25" value={p[sk] !== undefined && p[sk] !== "" ? p[sk] : ""} placeholder="—" disabled={isPending} onChange={function(e) { updatePlayer(p.id, sk, e.target.value === "" ? "" : parseFloat(e.target.value)); }} /></td>;
                              })}
                              <td style={Object.assign({}, cellStyle, { textAlign: "center" })}>
                                <select style={Object.assign({}, editStyle, { width: 60 })} value={p.preAssigned || ""} onChange={function(e) { updatePlayer(p.id, "preAssigned", e.target.value); }}>
                                  <option value="">—</option>
                                  {"ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").slice(0, teams.length).map(function(l) { return <option key={l} value={l}>{l}</option>; })}
                                </select>
                              </td>
                              <td style={Object.assign({}, cellStyle, { textAlign: "center" })}>
                                <select style={Object.assign({}, editStyle, { width: 80 })} value={p.preAssignedRound || ""} disabled={!p.preAssigned} onChange={function(e) { updatePlayer(p.id, "preAssignedRound", e.target.value); }}>
                                  <option value="">—</option>
                                  {Array.from({ length: numRounds }, function(_, i) { return i + 1; }).map(function(r) { return <option key={r} value={r}>Rd {r}</option>; })}
                                </select>
                              </td>
                              <td style={Object.assign({}, cellStyle, { textAlign: "center" })}>
                                <input type="checkbox" checked={!!p.pendingEval} onChange={function(e) { updatePlayer(p.id, "pendingEval", e.target.checked); }} title="Mark as pending evaluation" style={{ width: 16, height: 16, cursor: "pointer" }} />
                              </td>
                              <td style={cellStyle}>
                                <button onClick={function() { removePlayer(p.id); }} style={{ padding: "4px 8px", border: "1px solid var(--color-border-secondary)", borderRadius: 5, background: "var(--color-surface-danger)", color: "#dc2626", fontSize: 11, cursor: "pointer" }}>✕</button>
                              </td>
                            </tr>
                            {/* Expandable prior scores row */}
                            {isExpanded && (
                              <tr style={{ background: "var(--color-surface-info)", borderBottom: "1px solid var(--color-border-tertiary)" }}>
                                <td></td>
                                <td colSpan={2} style={{ padding: "6px 10px", fontSize: 11, fontWeight: 700, color: "var(--color-text-primary)", whiteSpace: "nowrap" }}>
                                  📅 Prior Season Scores
                                </td>
                                {["ps1","ps2","ps3","ps4","ps5"].map(function(sk, i) {
                                  var curr = parseFloat(p["s" + (i+1)]) || 0;
                                  var prior = p[sk] !== "" && p[sk] !== undefined ? parseFloat(p[sk]) : null;
                                  var delta = prior !== null ? Math.round((curr - prior) * 100) / 100 : null;
                                  return (
                                    <td key={sk} style={{ padding: "4px 4px", textAlign: "center" }}>
                                      <input type="number" style={psStyle} min="0" max="5" step="0.25" value={p[sk] !== undefined ? p[sk] : ""} placeholder="—" onChange={function(e) { updatePlayer(p.id, sk, e.target.value); }} />
                                      {delta !== null && <div style={{ fontSize: 9, fontWeight: 700, color: delta > 0 ? "#16a34a" : delta < 0 ? "#dc2626" : "var(--color-text-tertiary)", marginTop: 1 }}>{delta > 0 ? "▲+" : delta < 0 ? "▼" : "="}{delta !== 0 ? Math.abs(delta) : ""}</div>}
                                    </td>
                                  );
                                })}
                                <td colSpan={2} style={{ padding: "4px 8px", fontSize: 10, color: "var(--color-text-tertiary)" }}>
                                  YoY delta shown above each score
                                </td>
                              </tr>
                            )}
                          </React.Fragment>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              ) : (
                <div style={{ textAlign: "center", padding: "40px 0", color: "var(--color-text-tertiary)", fontSize: 13 }}>
                  No players yet. Add players manually or import via CSV above.
                </div>
              )}
            </div>
          )}

          {/* ── Security ── */}
          {section === "security" && (
            <div style={{ maxWidth: 420 }}>
              <div style={{ fontSize: 13, color: "var(--color-text-secondary)", marginBottom: 20 }}>
                Change the commissioner password for this board. You will need to re-enter it next time you open the panel.
              </div>
              <div style={{ display: "grid", gap: 12 }}>
                <div>
                  <label style={labelStyle}>Current Password</label>
                  <input type="password" style={inputStyle} value={password} onChange={function(e) { setPassword(e.target.value); setPwError(""); }} />
                </div>
                <div>
                  <label style={labelStyle}>New Password</label>
                  <input type="password" style={inputStyle} value={newPassword} onChange={function(e) { setNewPassword(e.target.value); setPwError(""); }} placeholder="Min. 4 characters" />
                </div>
                <div>
                  <label style={labelStyle}>Confirm New Password</label>
                  <input type="password" style={inputStyle} value={confirmPassword} onChange={function(e) { setConfirmPassword(e.target.value); setPwError(""); }} />
                </div>
              </div>
              {pwError && <div style={{ marginTop: 10, fontSize: 12, color: "#dc2626" }}>{pwError}</div>}
              {pwOk && <div style={{ marginTop: 10, fontSize: 12, color: "#16a34a", fontWeight: 700 }}>✅ Password changed successfully!</div>}
              <button onClick={handlePasswordChange} disabled={pwSaving} style={{ marginTop: 16, padding: "9px 20px", borderRadius: 8, border: "none", background: pwSaving ? "#fde68a" : "#d97706", color: "#fff", fontSize: 13, fontWeight: 700, cursor: pwSaving ? "not-allowed" : "pointer" }}>
                {pwSaving ? "Saving..." : "🔐 Change Password"}
              </button>
              <div style={{ marginTop: 20, padding: "12px 16px", background: "var(--color-surface-warning-alt)", borderRadius: 8, fontSize: 12, color: "var(--color-text-primary)", border: "1px solid var(--color-border-secondary)" }}>
                ⚠️ Password is stored as plain text in state.json on your NAS. This is appropriate for a local league tool but is not cryptographically secure.
              </div>
            </div>
          )}

          {/* ── Board Settings ── */}
          {section === "boardsettings" && (
            <div style={{ maxWidth: 520 }}>
              {bsError && <div style={{ marginBottom: 14, padding: "10px 14px", background: "var(--color-surface-danger)", border: "1px solid var(--color-border-secondary)", borderRadius: 8, fontSize: 12, color: "#dc2626", fontWeight: 600 }}>{bsError}</div>}
              {bsOk && <div style={{ marginBottom: 14, padding: "10px 14px", background: "var(--color-surface-success)", border: "1px solid #86efac", borderRadius: 8, fontSize: 12, color: "#16a34a", fontWeight: 600 }}>✅ {bsOk}</div>}

              {/* Current state banner */}
              {boardArchived ? (
                <div style={{ marginBottom: 20, padding: "12px 16px", background: "#1e1b4b", borderRadius: 10, color: "#fff", fontSize: 13, fontWeight: 700 }}>
                  📦 This board is currently <strong>Archived</strong> — all edits are disabled for coaches. Only the commissioner can unarchive it using the unlock code.
                </div>
              ) : (
                <div style={{ marginBottom: 20, padding: "12px 16px", background: "var(--color-background-secondary)", border: "1px solid var(--color-border-tertiary)", borderRadius: 10, fontSize: 13, color: "var(--color-text-secondary)" }}>
                  Board is active. Use the controls below to manage draft state.
                </div>
              )}

              {/* Lock / Unlock */}
              {!boardArchived && (
                <div style={{ marginBottom: 24, padding: "16px 18px", background: "var(--color-background-primary)", border: "1px solid var(--color-border-tertiary)", borderRadius: 10 }}>
                  <div style={{ fontSize: 14, fontWeight: 800, color: "var(--color-text-primary)", marginBottom: 6 }}>🔒 Draft Lock</div>
                  <div style={{ fontSize: 12, color: "var(--color-text-tertiary)", marginBottom: 12 }}>Lock the board to prevent any changes by coaches. Syncs instantly to all connected clients. You can unlock at any time.</div>
                  <button disabled={bsWorking} onClick={function() {
                    setBsWorking(true); setBsError(""); setBsOk("");
                    fetch("/draft/" + boardId + "/api/commissioner/lock", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ password: commissionerPassword, locked: !boardLocked }) })
                      .then(function(r) { return r.json(); })
                      .then(function(d) { setBsWorking(false); if (d.ok) { setBsOk(d.locked ? "Board locked." : "Board unlocked."); } else { setBsError(d.error || "Failed"); } })
                      .catch(function() { setBsWorking(false); setBsError("Network error"); });
                  }} style={{ padding: "8px 18px", border: "none", borderRadius: 7, fontSize: 13, fontWeight: 700, cursor: bsWorking ? "not-allowed" : "pointer", background: boardLocked ? "#16a34a" : "#374151", color: "#fff" }}>
                    {bsWorking ? "Working..." : boardLocked ? "🔓 Unlock Board" : "🔒 Lock Board"}
                  </button>
                </div>
              )}

              {/* Reset Draft */}
              {!boardArchived && (
                <div style={{ marginBottom: 24, padding: "16px 18px", background: "var(--color-background-primary)", border: "1px solid var(--color-border-tertiary)", borderRadius: 10 }}>
                  <div style={{ fontSize: 14, fontWeight: 800, color: "var(--color-text-primary)", marginBottom: 6 }}>↺ Reset Draft</div>
                  <div style={{ fontSize: 12, color: "var(--color-text-tertiary)", marginBottom: 12 }}>Clears all picks and draft history. Notes and position tags are preserved. Type <strong>RESET</strong> to confirm.</div>
                  <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                    <input style={Object.assign({}, inputStyle, { width: 140 })} placeholder="Type RESET" value={resetConfirmText} onChange={function(e) { setResetConfirmText(e.target.value); }} />
                    <button disabled={bsWorking || resetConfirmText !== "RESET"} onClick={function() {
                      setBsWorking(true); setBsError(""); setBsOk("");
                      fetch("/draft/" + boardId + "/api/commissioner/reset", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ password: commissionerPassword }) })
                        .then(function(r) { return r.json(); })
                        .then(function(d) { setBsWorking(false); setResetConfirmText(""); if (d.ok) { setBsOk("Draft reset. All picks and history cleared."); } else { setBsError(d.error || "Failed"); } })
                        .catch(function() { setBsWorking(false); setBsError("Network error"); });
                    }} style={{ padding: "8px 18px", border: "none", borderRadius: 7, fontSize: 13, fontWeight: 700, cursor: (bsWorking || resetConfirmText !== "RESET") ? "not-allowed" : "pointer", background: resetConfirmText === "RESET" ? "#dc2626" : "#9ca3af", color: "#fff", whiteSpace: "nowrap" }}>
                      Reset Draft
                    </button>
                  </div>
                </div>
              )}

              {/* Full Reset */}
              {!boardArchived && (
                <div style={{ marginBottom: 24, padding: "16px 18px", background: "var(--color-background-primary)", border: "1px solid var(--color-border-secondary)", borderRadius: 10 }}>
                  <div style={{ fontSize: 14, fontWeight: 800, color: "#dc2626", marginBottom: 6 }}>⚠️ Full Reset</div>
                  <div style={{ fontSize: 12, color: "var(--color-text-tertiary)", marginBottom: 12 }}>Clears <strong>everything</strong> — picks, draft history, all team notes, and all player scouting notes. Commissioner config and player data are preserved. Type <strong>FULL RESET</strong> to confirm.</div>
                  <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                    <input style={Object.assign({}, inputStyle, { width: 180 })} placeholder="Type FULL RESET" value={fullResetConfirmText} onChange={function(e) { setFullResetConfirmText(e.target.value); }} />
                    <button disabled={bsWorking || fullResetConfirmText !== "FULL RESET"} onClick={function() {
                      setBsWorking(true); setBsError(""); setBsOk("");
                      fetch("/draft/" + boardId + "/api/commissioner/fullreset", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ password: commissionerPassword }) })
                        .then(function(r) { return r.json(); })
                        .then(function(d) { setBsWorking(false); setFullResetConfirmText(""); if (d.ok) { setBsOk("Full reset complete. All picks, history, and notes cleared."); } else { setBsError(d.error || "Failed"); } })
                        .catch(function() { setBsWorking(false); setBsError("Network error"); });
                    }} style={{ padding: "8px 18px", border: "none", borderRadius: 7, fontSize: 13, fontWeight: 700, cursor: (bsWorking || fullResetConfirmText !== "FULL RESET") ? "not-allowed" : "pointer", background: fullResetConfirmText === "FULL RESET" ? "#dc2626" : "#9ca3af", color: "#fff", whiteSpace: "nowrap" }}>
                      Full Reset
                    </button>
                  </div>
                </div>
              )}

              {/* Archive / Unarchive */}
              <div style={{ marginBottom: 8, padding: "16px 18px", background: boardArchived ? "var(--color-surface-success)" : "var(--color-background-primary)", border: "1px solid " + (boardArchived ? "#86efac" : "#7c3aed") + "88", borderRadius: 10 }}>
                {!boardArchived ? (
                  <div>
                    <div style={{ fontSize: 14, fontWeight: 800, color: "#7c3aed", marginBottom: 6 }}>📦 Archive Board</div>
                    <div style={{ fontSize: 12, color: "var(--color-text-tertiary)", marginBottom: 12 }}>Archives the board as a permanent read-only record. All draft controls are disabled for coaches. You can unarchive later using a separate unlock code. Set your unlock code below, then type <strong>ARCHIVE</strong> to confirm.</div>
                    <div style={{ display: "grid", gap: 10 }}>
                      <input style={inputStyle} placeholder="Set archive unlock code (min. 4 chars)" value={archiveUnlockCode} onChange={function(e) { setArchiveUnlockCode(e.target.value); }} />
                      <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                        <input style={Object.assign({}, inputStyle, { width: 160 })} placeholder="Type ARCHIVE" value={archiveConfirmText} onChange={function(e) { setArchiveConfirmText(e.target.value); }} />
                        <button disabled={bsWorking || archiveConfirmText !== "ARCHIVE" || archiveUnlockCode.trim().length < 4} onClick={function() {
                          setBsWorking(true); setBsError(""); setBsOk("");
                          fetch("/draft/" + boardId + "/api/commissioner/archive", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ password: commissionerPassword, unlockCode: archiveUnlockCode.trim() }) })
                            .then(function(r) { return r.json(); })
                            .then(function(d) { setBsWorking(false); setArchiveConfirmText(""); setArchiveUnlockCode(""); if (d.ok) { setBsOk("Board archived successfully."); if (onArchivedChange) onArchivedChange(true); } else { setBsError(d.error || "Failed"); } })
                            .catch(function() { setBsWorking(false); setBsError("Network error"); });
                        }} style={{ padding: "8px 18px", border: "none", borderRadius: 7, fontSize: 13, fontWeight: 700, cursor: (bsWorking || archiveConfirmText !== "ARCHIVE" || archiveUnlockCode.trim().length < 4) ? "not-allowed" : "pointer", background: (archiveConfirmText === "ARCHIVE" && archiveUnlockCode.trim().length >= 4) ? "#7c3aed" : "#9ca3af", color: "#fff", whiteSpace: "nowrap" }}>
                          Archive Board
                        </button>
                      </div>
                    </div>
                  </div>
                ) : (
                  <div>
                    <div style={{ fontSize: 14, fontWeight: 800, color: "#16a34a", marginBottom: 6 }}>🔓 Unarchive Board</div>
                    <div style={{ fontSize: 12, color: "var(--color-text-tertiary)", marginBottom: 12 }}>Enter the archive unlock code to restore the board to active status. Once unarchived, coaches can make changes again.</div>
                    <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                      <input type="password" style={Object.assign({}, inputStyle, { width: 220 })} placeholder="Archive unlock code" value={unarchiveCode} onChange={function(e) { setUnarchiveCode(e.target.value); }} />
                      <button disabled={bsWorking || !unarchiveCode.trim()} onClick={function() {
                        setBsWorking(true); setBsError(""); setBsOk("");
                        fetch("/draft/" + boardId + "/api/commissioner/unarchive", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ password: commissionerPassword, unlockCode: unarchiveCode.trim() }) })
                          .then(function(r) { return r.json(); })
                          .then(function(d) { setBsWorking(false); setUnarchiveCode(""); if (d.ok) { setBsOk("Board unarchived."); if (onArchivedChange) onArchivedChange(false); } else { setBsError(d.error || "Incorrect unlock code"); } })
                          .catch(function() { setBsWorking(false); setBsError("Network error"); });
                      }} style={{ padding: "8px 18px", border: "none", borderRadius: 7, fontSize: 13, fontWeight: 700, cursor: (bsWorking || !unarchiveCode.trim()) ? "not-allowed" : "pointer", background: unarchiveCode.trim() ? "#16a34a" : "#9ca3af", color: "#fff", whiteSpace: "nowrap" }}>
                        Unarchive
                      </button>
                    </div>
                  </div>
                )}
              </div>

              {/* New Season / Factory Reset */}
              <div style={{ marginTop: 8, padding: "16px 18px", background: "var(--color-background-primary)", border: "2px solid #991b1b", borderRadius: 10 }}>
                <div style={{ fontSize: 14, fontWeight: 800, color: "var(--color-text-primary)", marginBottom: 6 }}>🔄 New Season / Factory Reset</div>
                <div style={{ fontSize: 12, color: "var(--color-text-tertiary)", marginBottom: 12 }}>Wipes <strong>everything</strong> — all picks, history, notes, position tags, commissioner config, and resets the commissioner password to <code style={{ background: "var(--color-background-secondary)", padding: "1px 5px", borderRadius: 3 }}>commissioner</code>. This cannot be undone. Re-enter your commissioner password and type <strong>NEW SEASON</strong> to confirm.</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  <input type="password" style={Object.assign({}, inputStyle, { width: "100%" })} placeholder="Re-enter commissioner password" value={factoryResetPassword} onChange={function(e) { setFactoryResetPassword(e.target.value); }} />
                  <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                    <input style={Object.assign({}, inputStyle, { width: 180 })} placeholder="Type NEW SEASON" value={factoryResetConfirmText} onChange={function(e) { setFactoryResetConfirmText(e.target.value); }} />
                    <button disabled={bsWorking || factoryResetConfirmText !== "NEW SEASON" || !factoryResetPassword.trim()} onClick={function() {
                      setBsWorking(true); setBsError(""); setBsOk("");
                      fetch("/draft/" + boardId + "/api/commissioner/factoryreset", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ password: factoryResetPassword, confirmText: factoryResetConfirmText }) })
                        .then(function(r) { return r.json(); })
                        .then(function(d) { setBsWorking(false); setFactoryResetConfirmText(""); setFactoryResetPassword(""); if (d.ok) { setBsOk("Factory reset complete. Board has been wiped and reset to initial state."); } else { setBsError(d.error || "Failed"); } })
                        .catch(function() { setBsWorking(false); setBsError("Network error"); });
                    }} style={{ padding: "8px 18px", border: "none", borderRadius: 7, fontSize: 13, fontWeight: 700, cursor: (bsWorking || factoryResetConfirmText !== "NEW SEASON" || !factoryResetPassword.trim()) ? "not-allowed" : "pointer", background: (factoryResetConfirmText === "NEW SEASON" && factoryResetPassword.trim()) ? "#991b1b" : "#9ca3af", color: "#fff", whiteSpace: "nowrap" }}>
                      Factory Reset
                    </button>
                  </div>
                </div>
              </div>

            </div>
          )}

        </div>
      </div>
    </div>,
    document.body
  );
}




function TutorialModal({ onClose }) {
  var STEPS = [
    { id: "welcome",   title: "Welcome to DraftKit",              anim: "welcome",   desc: "This is a real-time collaborative draft tool. Multiple coaches can be connected at once — any pick made on one screen is instantly visible on all others. Use the arrows or keyboard to navigate this tour." },
    { id: "eval",      title: "The eval system",                   anim: "eval",      desc: "Every player is evaluated at five stations configured for your league. Each is scored 0-5. Scores sum to an overall out of 25. The commissioner designates one station as the Priority Station — players scoring 4+ are highlighted with an amber border and treated as priority draft targets." },
    { id: "tiers",     title: "Tiers and projected round",         anim: "tiers",     desc: "Players are grouped into 11 tiers by overall score. Tier 1 (22+) is Exceptional, Tier 11 (under 7) is Beginner. Projected Round (PR) estimates which round a player would be drafted in a fair draft — shown as a blue badge. Use PR to spot value picks." },
    { id: "myteam",    title: "Set your team first",               anim: "myteam",    desc: "Before doing anything else, click your team abbreviation in the toolbar. This unlocks the Next Best Available recommendation, your Notes tab, and the Email Generator — and highlights your picks throughout the board." },
    { id: "nba",       title: "Next Best Available",               anim: "nba",       desc: "The gold banner recommends who to draft next. It runs in Priority mode until your team has 2 players scoring 4+ at the Priority Station, then switches to Balanced mode. Year-over-year improvement and prior coaching history are used as tiebreakers." },
    { id: "drafting",  title: "Drafting a player",                 anim: "drafting",  desc: "Click any player card to expand it and see full eval scores and draft controls. Select a round number, then click your team to complete the pick. The card locks in your team color and dims on other coaches screens." },
    { id: "undo",      title: "Undo, reset, and lock",             anim: "undo",      desc: "Undo reverses the most recent pick and can be pressed repeatedly. Reset Draft clears all free-agent picks while preserving position tags. Lock Board prevents any changes once the draft is done — syncs across all connected devices instantly." },
    { id: "scouting",  title: "Scouting tab",                      anim: "scouting",  desc: "Shows year-over-year eval comparisons for returning players with prior season scores on file, sorted by most improved. A green border means +2 or more overall — a strong value signal for later rounds. Toggle the 🏅 Prev. Coached flag on any player card or in the player detail modal to mark players you coached last season — shown as a purple badge, private to your team, and used as a NBA tiebreaker." },
    { id: "teamview",  title: "Team View tab",                     anim: "teamview",  desc: "Shows each team roster with average score, age, priority player count, and a horizontal bar for each of the 5 eval stations. Bar length shows actual average score; color and rank label show standing vs other teams. Best is green, Weakest is red." },
    { id: "pickorder", title: "Pick Order tab",                    anim: "pickorder", desc: "Shows the complete snake draft sequence — every round, every team, every slot. Your team rows are highlighted. Filter by team or round to see exactly when you pick next. Unfilled slots show TBD." },
    { id: "analytics", title: "Analytics tab",                     anim: "teamview",  desc: "Four live charts visualize draft results across all teams: Team Radar (station averages as overlapping polygons), Tier Distribution (picks by tier per team), Draft Score Timeline (cumulative avg score by round), and Station Averages (horizontal bars per station). Charts update in real time as picks are made." },
    { id: "notes",     title: "Notes and scouting notes",          anim: "notes",     desc: "The Notes tab is a private per-team notepad for draft strategy. Click any underlined player name anywhere on the board to open their detail card, where you can add private scouting notes only your team can see." },
    { id: "positions", title: "Position tags",                     anim: "positions", desc: "Expand any player card and click position buttons to tag players with defensive positions. The available positions are configured by the commissioner for your sport. Tags appear on the card, in Team View, Pick Order, and the Draft Recap. They persist after Reset Draft." },
    { id: "email",     title: "Welcome email generator",           anim: "email",     desc: "After the draft, click the Email tab to compose a season welcome email for your team families. Fill in the fields — the preview updates live. Toggle sections on or off, edit inline, then copy and paste into Gmail or Outlook." },
    { id: "recap",     title: "Draft Recap and Export",            anim: "recap",     desc: "Once all picks are made, click View Draft Recap for a full post-draft summary with stats, rankings, and callout badges for every team. Use Export to download an xlsx draft sheet. Both have Print / Save PDF options." },
    { id: "commissioner", title: "Commissioner Mode",              anim: "ready",     desc: "The ⚙️ Commissioner button in the header opens the Commissioner Panel — password protected. From here you can configure the league, teams, eval stations, players, and board settings including Lock, Reset, Full Reset, Archive, and New Season / Factory Reset. In the Players section, use the ⬇ Download Template button to get a pre-formatted CSV with your configured station names — fill it in and upload it to import your full player roster at once." },
    { id: "ready",     title: "You are ready to draft!",           anim: "ready",     desc: "That covers everything. The Guide tab has detailed documentation for every feature. The What's New tab tracks every update. Good luck — and remember to secure your priority station players early." },
  ];

  var total = STEPS.length;
  var [step, setStep] = React.useState(0);
  var current = STEPS[step];

function EmailTab({ myTeam, teamRosters, emailFields, setEmailFields, emailCoachesRef, emailTab, setEmailTab, teams, boardArchived }) {
  var team = (teams || TEAMS)[myTeam];

  var [editedSections, setEditedSections] = React.useState({});

  coachNames.forEach(function(name) {
    if (!emailCoachesRef.current[name]) emailCoachesRef.current[name] = { nick: "", mobile: "", email: "" };
  });

  function ef(key) { return emailFields[key] || ""; }
  function ph(label) { return '<span style="color:#ea580c;font-style:italic">[' + label + ']</span>'; }
  function tog(id) { return emailFields.sectionToggles ? emailFields.sectionToggles[id] !== false : true; }

  function setToggle(id, val) {
    setEmailFields(function(f) {
      var newToggles = Object.assign({}, f.sectionToggles || {}, { [id]: val });
      return Object.assign({}, f, { sectionToggles: newToggles });
    });
  }

  function formatDate(val) {
    if (!val) return null;
    var parts = val.split("-");
    if (parts.length !== 3) return val;
    var months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    var days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    var d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
    return days[d.getDay()] + ", " + months[d.getMonth()] + " " + d.getDate();
  }

  function formatTime(val) {
    if (!val) return null;
    var parts = val.split(":");
    if (parts.length < 2) return val;
    var h = parseInt(parts[0]);
    var m = parseInt(parts[1]);
    var ampm = h >= 12 ? "PM" : "AM";
    var h12 = h % 12 || 12;
    return h12 + (m > 0 ? ":" + String(m).padStart(2, "0") : "") + " " + ampm;
  }

  function formatPhone(val) {
    if (!val) return null;
    var digits = val.replace(/\D/g, "");
    if (digits.length === 10) return digits.slice(0,3) + "-" + digits.slice(3,6) + "-" + digits.slice(6);
    if (digits.length === 11 && digits[0] === "1") return digits.slice(1,4) + "-" + digits.slice(4,7) + "-" + digits.slice(7);
    return val;
  }

  function buildRoster() {
    var roster = teamRosters[myTeam] || [];
    return roster
      .map(function(p) { return p.name; })
      .sort(function(a, b) { return a.localeCompare(b); })
      .map(function(n) {
        var parts = n.split(", ");
        return parts.length > 1 ? parts[1] + " " + parts[0] : n;
      });
  }

  function buildCoachIntro() {
    return coachNames.map(function(n) {
      var c = emailCoachesRef.current[n] || {};
      return n + " (" + (c.nick || ("Coach " + n.split(" ")[0])) + ")";
    }).join(", ");
  }

  function buildSignoff() {
    return coachNames.map(function(n) {
      var c = emailCoachesRef.current[n] || {};

        "<p>Uniforms will be distributed prior to our first game and will consist of a team shirt, team visor, and socks. Each girl must have a glove and must bring it to each practice and game. Girls are strongly encouraged to bring their own helmets. Helmets with cages are best. Your coaches will have additional helmets available for communal use if needed. Softball pants are strongly recommended for game days (any color is ok!). Cleats are strongly recommended, as the fields and grass can get muddy and slippery. A fielder\u2019s mask is required for pitchers (provided by the league) and is encouraged for all players. Please make sure your daughter wears sunscreen and brings water each week. Please make sure that ALL equipment is clearly labeled with your daughter\u2019s name.</p>",

            </div>
          </div>
        )}
      </div>
    );
  }
}


function DraftBoard({ darkMode, setDarkMode }) {
  var [drafted, setDrafted] = useState(INITIAL_DRAFTED);
  var [selected, setSelected] = useState(null);
  var [draftRound, setDraftRound] = useState(null);
  var [search, setSearch] = useState("");
  var [filterTier, setFilterTier] = useState("all");
  var [filterAvail, setFilterAvail] = useState("all");
  var [sortBy, setSortBy] = useState("tier");
  var [activeTab, setActiveTab] = useState("board");
  var [emailTab, setEmailTab] = useState("fields");
  var [emailFields, setEmailFields] = useState({
    subject: "Welcome to " + LEAGUE_INFO.year + " " + LEAGUE_INFO.name + " " + LEAGUE_INFO.division + " Division!",
    firstPracticeDate: "",
    firstPracticeTime: "",
    firstLocation: "",
    practiceDays: "",
    weekdayTime: "",
    gameDays: "",
    seasonEnd: "",
    openingDay: "",
    blackouts: "",
    gcLink: "",
    sectionToggles: { intro: true, divoverview: true, schedule: true, weather: true, uniforms: true, parents: true, gamechanger: true, roster: true, signoff: true },
  });
  var emailCoachesRef = React.useRef({});
  var [myTeam, setMyTeam] = useState("A");
  var [myTeamSet, setMyTeamSet] = useState(false);
  var [showResetConfirm, setShowResetConfirm] = useState(false);
  var [showAutoDraftConfirm, setShowAutoDraftConfirm] = useState(false);
  var [showExport, setShowExport] = useState(false);
  var [exportTeamFilter, setExportTeamFilter] = useState("all");
  var [draftHistory, setDraftHistory] = useState([]);
  var [showPickLog, setShowPickLog] = useState(false);
  var [pickOrderTeam, setPickOrderTeam] = useState("all");
  var [pickOrderRound, setPickOrderRound] = useState("all");
  var [boardLocked, setBoardLocked] = useState(false);
  var [boardArchived, setBoardArchived] = useState(false);
  var [showRecap, setShowRecap] = useState(false);
  var [showTutorial, setShowTutorial] = useState(false);
  var isDark = useIsDark();
  var [changelog, setChangelog] = useState(null);
  var [changelogError, setChangelogError] = useState(false);
  var [collapsedGroups, setCollapsedGroups] = useState({});
  var [modalPlayer, setModalPlayer] = useState(null);
  var notesStore = React.useRef({});
  var notesEditorRef = React.useRef(null);
  var playerNotesStore = React.useRef({});
  var playerNoteDebounceTimers = React.useRef({});

  // ── Commissioner Mode state ──────────────────────────────────────────────────
  var [commissionerUnlocked, setCommissionerUnlocked] = useState(null); // stores the password string when unlocked
  var [showCommissionerLogin, setShowCommissionerLogin] = useState(false);
  var [showCommissionerPanel, setShowCommissionerPanel] = useState(false);
  var [commissionerConfig, setCommissionerConfig] = useState(null);

  // ── Runtime config derivation ─────────────────────────────────────────────
  // When commissionerConfig is present, it overrides hardcoded constants.
  // Fallback to hardcoded values so the demo board always works out of the box.

  var cfg = commissionerConfig || {};

  // Teams: build a lookup object keyed by team letter, same shape as TEAMS
  var cfgTeams = useMemo(function() {
    if (!cfg.teams || !cfg.teams.length) return TEAMS;
    var map = {};
    cfg.teams.forEach(function(t) {
      // Derive a light background from the team color
      function hexToLight(hex) {
        var n = parseInt((hex || "#374151").replace("#",""), 16);
        var r = Math.min(255, ((n >> 16) & 0xff) + 160);
        var g = Math.min(255, ((n >> 8)  & 0xff) + 160);
        var b = Math.min(255, (n & 0xff)          + 160);
        return "#" + [r,g,b].map(function(v) { return v.toString(16).padStart(2,"0"); }).join("");
      }
      map[t.id] = {
        name:    t.name    || t.id,
        abbr:    t.name ? t.name.slice(0,3).toUpperCase() : t.id,
        coaches: t.coaches || "",
        color:   t.color   || "#374151",
        light:     hexToLight(t.color),
        darkLight: hexToDarkSurface(t.color),
      };
    });
    return map;
  }, [commissionerConfig]);

  // Team keys in draft order (Round 1 sequence = commissioner array order)
  var cfgTeamKeys = useMemo(function() {
    return Object.keys(cfgTeams);
  }, [cfgTeams]);

  // League info
  var cfgLeague = useMemo(function() {
    return {
      name:      cfg.leagueName  || LEAGUE_INFO.name,
      abbr:      cfg.leagueName  ? cfg.leagueName.split(" ").map(function(w) { return w[0]; }).join("").toUpperCase() : LEAGUE_INFO.abbr,
      season:    cfg.season      || LEAGUE_INFO.year,
      seasonName:cfg.seasonName  || "Spring",
      sport:     cfg.sport       || "Softball",
      sportEmoji:cfg.sportEmoji  || "🥎",
      division:  cfg.division   || "",
    };
  }, [commissionerConfig]);

  // Board header presentation
  var cfgHeader = useMemo(function() {
    var autoTitle = [cfg.leagueName, cfg.seasonName, cfg.season, "Draft Board"].filter(Boolean).join(" ");
    var title     = (cfg.boardTitle && cfg.boardTitle.trim()) ? cfg.boardTitle.trim() : autoTitle || (LEAGUE_INFO.abbr + " Draft Board · Demo");
    var color     = cfg.headerColor  || "#1e1b4b";
    function darken(hex, amt) {
      var n = parseInt(hex.replace("#",""), 16);
      var r = Math.max(0, (n >> 16) - amt);
      var g = Math.max(0, ((n >> 8) & 0xff) - amt);
      var b = Math.max(0, (n & 0xff) - amt);
      return "#" + [r,g,b].map(function(v) { return v.toString(16).padStart(2,"0"); }).join("");
    }
    var gradient     = "linear-gradient(135deg, " + darken(color, 30) + " 0%, " + color + " 100%)";
    var darkColor    = hexToDarkHeader(color);
    var darkGradient = "linear-gradient(135deg, " + darken(darkColor, 20) + " 0%, " + darkColor + " 100%)";
    return { title: title, color: color, gradient: gradient, darkGradient: darkGradient };
  }, [commissionerConfig]);

  // Eval station labels
  var cfgStations = useMemo(function() {
    return cfg.evalStations || ["FG", "FF", "Throw", "Hit", "Pitch"];
  }, [commissionerConfig]);

  // Priority station index (replaces hardcoded pitching=4)
  var cfgPriorityIdx = typeof cfg.priorityStation === "number" ? cfg.priorityStation : 4;

  // Position tags — commissioner-configurable, falls back to hardcoded default
  var cfgPositions = (commissionerConfig && commissionerConfig.positions && commissionerConfig.positions.length > 0) ? commissionerConfig.positions : POSITIONS;

  // Snake vs straight
  var cfgSnake = typeof cfg.snakeDraft === "boolean" ? cfg.snakeDraft : true;
  var cfgNumRounds = parseInt(cfg.numRounds) || 12;

  // Schedule rows
  var cfgSchedule = useMemo(function() {
    if (cfg.schedule && cfg.schedule.length) return cfg.schedule;
    return [];
  }, [commissionerConfig]);

  // Players: use commissioner players when available, else RAW_PLAYERS
  var cfgPlayers = useMemo(function() {
    // Only fall back to RAW_PLAYERS if commissioner config has never been saved
    if (!commissionerConfig) return null;
    // If config exists but no players, return empty array
    if (!cfg.players || !cfg.players.length) return [];
    var priIdx = typeof cfg.priorityStation === "number" ? cfg.priorityStation : 4;
    return cfg.players
      .filter(function(p) { return p.name && p.name.trim(); })
      .map(function(p) {
        var isPending = !!p.pendingEval;
        var hasCurrentScores = [p.s1,p.s2,p.s3,p.s4,p.s5].some(function(v) { return v !== "" && v !== undefined && v !== null && !isNaN(parseFloat(v)); });
        var scores = [
          isPending ? 0 : (parseFloat(p.s1) || 0),
          isPending ? 0 : (parseFloat(p.s2) || 0),
          isPending ? 0 : (parseFloat(p.s3) || 0),
          isPending ? 0 : (parseFloat(p.s4) || 0),
          isPending ? 0 : (parseFloat(p.s5) || 0),
        ];
        // Prior season scores
        var ps1 = p.ps1 !== undefined && p.ps1 !== "" ? parseFloat(p.ps1) : null;
        var ps2 = p.ps2 !== undefined && p.ps2 !== "" ? parseFloat(p.ps2) : null;
        var ps3 = p.ps3 !== undefined && p.ps3 !== "" ? parseFloat(p.ps3) : null;
        var ps4 = p.ps4 !== undefined && p.ps4 !== "" ? parseFloat(p.ps4) : null;
        var ps5 = p.ps5 !== undefined && p.ps5 !== "" ? parseFloat(p.ps5) : null;
        var hasPrior = [ps1,ps2,ps3,ps4,ps5].some(function(v) { return v !== null && !isNaN(v); });
        var priorScores = hasPrior ? [ps1||0, ps2||0, ps3||0, ps4||0, ps5||0] : null;
        var priorOverall = priorScores ? Math.round(priorScores.reduce(function(a,b){return a+b;},0)*100)/100 : null;
        // If no current scores but prior scores exist, use prior scores as the source of truth
        var usingPrior = !isPending && !hasCurrentScores && hasPrior;
        var effectiveScores = usingPrior ? priorScores : scores;
        var overall = isPending ? 0 : Math.round(effectiveScores.reduce(function(a,b){return a+b;},0) * 100)/100;
        var tier = isPending ? null : (overall >= 22 ? 1 : overall >= 20 ? 2 : overall >= 18.5 ? 3 : overall >= 17 ? 4 : overall >= 15.5 ? 5 : overall >= 14 ? 6 : overall >= 12.5 ? 7 : overall >= 11 ? 8 : overall >= 9 ? 9 : overall >= 7 ? 10 : 11);
        return {
          name:          p.name.trim(),
          age:           parseFloat(p.age) || null,
          fieldingG:     effectiveScores[0],
          fieldingF:     effectiveScores[1],
          throwing:      effectiveScores[2],
          hitting:       effectiveScores[3],
          pitching:      effectiveScores[4],
          priorityScore: effectiveScores[priIdx],
          overall:       overall,
          tier:          tier,
          note:          usingPrior ? "Prior season scores" : null,
          pendingEval:   isPending,
          // Prior season
          priorScores:   priorScores,
          priorOverall:  priorOverall,
        };
      });
  }, [commissionerConfig]);

  // Effective player list
  var activePlayers = cfgPlayers !== null ? cfgPlayers : [];

  // Projected Round — computed dynamically from activePlayers and team count
  // All players (including pre-assigned) get a PR based on their eval rank
  // pendingEval players excluded — no score = no meaningful rank
  var projectedRounds = useMemo(function() {
    var teamsCount = Math.max(cfgTeamKeys.length, 1);
    var ranked = activePlayers
      .filter(function(p) { return !p.pendingEval && p.tier !== null && p.overall !== null; })
      .slice()
      .sort(function(a, b) {
        if (b.overall !== a.overall) return b.overall - a.overall;
        return a.name.localeCompare(b.name);
      });
    var result = {};
    ranked.forEach(function(p, i) {

    });

  // Pre-assigned players from commissioner config
  var cfgPreAssigned = useMemo(function() {
    if (!cfg.players || !cfg.players.length) return null;
    var map = {};
    cfg.players.forEach(function(p) {
      if (p.preAssigned && p.name) {
        var r = p.preAssignedRound ? parseInt(p.preAssignedRound) : null;

      }

  }, [commissionerConfig]);

  // Effective pre-assigned lookup
  var activePreAssigned = cfgPreAssigned || {};

  function updateEditorFromStore(team) {
    var t = team || myTeam;
    if (notesEditorRef.current && document.activeElement !== notesEditorRef.current) {
      notesEditorRef.current.innerHTML = notesStore.current[t] || "";

  }

  useDraftSync(drafted, setDrafted, boardLocked, setBoardLocked, draftHistory, setDraftHistory, function(incomingNotes) { notesStore.current = incomingNotes; updateEditorFromStore(); }, function(incomingPlayerNotes) { playerNotesStore.current = incomingPlayerNotes; }, function(cfg) { setCommissionerConfig(cfg); }, function(archived) { setBoardArchived(archived); });

  React.useEffect(function() {

      .then(function(r) { return r.json(); })
      .then(function(data) { setChangelog(data); })
      .catch(function() { setChangelogError(true); });
  }, []);

  // Sync document.title with commissioner config
  React.useEffect(function() {
    document.title = cfgLeague.sportEmoji + " " + cfgHeader.title + " — Demo";
  }, [commissionerConfig]);

  // Commissioner assignments always win — overwrite any existing drafted entry for pre-assigned players
  React.useEffect(function() {
