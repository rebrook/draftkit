      return { complete: false, team: slot.team, round: slot.round, pickNum: pickNum + 1 };
    }
    return { complete: true };
  }, [drafted, commissionerConfig]);

  var fullPickLog = useMemo(function() {
    var log = [];
    Object.entries(activePreAssigned).forEach(function(e) {
      var name = e[0]; var pa = e[1];
      var player = activePlayers.find(function(p) { return p.name === name; });
      if (!player) return;
      log.push({ name: name, team: pa.team, round: pa.round, pickNum: null, isCD: true, tier: player.tier, overall: player.overall });
    });
    log.sort(function(a, b) { return (a.round || 0) - (b.round || 0); });
    draftHistory.forEach(function(entry, idx) {
      var player = activePlayers.find(function(p) { return p.name === entry.name; });
      log.push({ name: entry.name, team: entry.team, round: entry.round, pickNum: idx + 1, isCD: false, tier: player ? player.tier : null, overall: player ? player.overall : null });
    });
    return log.slice().reverse();
  }, [draftHistory, commissionerConfig]);

  var inputStyle = { padding: "7px 11px", border: "1px solid var(--color-border-secondary)", borderRadius: 7, fontSize: 13, background: "var(--color-background-primary)", color: "var(--color-text-primary)", outline: "none" };
  function btnStyle(active) { return { padding: "7px 14px", border: "none", borderRadius: 7, fontSize: 13, fontWeight: 600, cursor: "pointer", background: active ? "#7c3aed" : "var(--color-background-secondary)", color: active ? "#fff" : "var(--color-text-secondary)", flexShrink: 0, whiteSpace: "nowrap" }; }

  function formatScheduleDate(val) {
    if (!val) return "";
    if (!/^\d{4}-\d{2}-\d{2}/.test(val)) return val;
    var d = new Date(val + "T12:00:00");
    var days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    return days[d.getDay()] + " " + (d.getMonth()+1) + "/" + d.getDate() + "/" + d.getFullYear();
  }

  return (
    <div style={{ fontFamily: "Georgia, serif", background: "var(--color-background-secondary)", minHeight: "100vh" }}>
      <div style={{ background: isDark ? cfgHeader.darkGradient : cfgHeader.gradient, padding: "20px 28px", color: "#fff" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>
          <div>
            <div style={{ fontSize: 22, fontWeight: 800, letterSpacing: "-0.5px" }}>{cfgLeague.sportEmoji} {cfgHeader.title}</div>
            <div style={{ fontSize: 13, opacity: 0.75, marginTop: 2 }}>{cfgLeague.seasonName} {cfgLeague.season} &middot; {cfgLeague.name}{cfgLeague.division ? " \u00b7 " + cfgLeague.division : ""} &middot; {activePlayers.length} Players</div>
            <div style={{ fontSize: 11, opacity: 0.45, marginTop: 2, fontStyle: "italic" }}>{VERSION}</div>
          </div>
          <div style={{ display: "flex", gap: 16, flexWrap: "wrap", alignItems: "center" }}>
            {[{ label: "Total Players", val: stats.total }, { label: "Drafted", val: stats.draftedCount, color: "#fbbf24" }, { label: "Available", val: stats.available - stats.pendingCount, color: "#34d399" }, { label: "Pending Evals", val: stats.pendingCount, color: "#fb923c" }].map(function(s) {
              return <div key={s.label} style={{ textAlign: "center" }}><div style={{ fontSize: 26, fontWeight: 800, color: s.color || "#fff" }}>{s.val}</div><div style={{ fontSize: 11, opacity: 0.7 }}>{s.label}</div></div>;
            })}
            <button onClick={function() { setShowExport(true); }} style={{ padding: "7px 14px", border: "1px solid rgba(255,255,255,0.5)", borderRadius: 7, fontSize: 12, fontWeight: 700, cursor: "pointer", background: "rgba(255,255,255,0.1)", color: "#fff", marginLeft: 8 }}>📤 Export</button>
            <button onClick={function() { setShowTutorial(true); }} style={{ padding: "7px 14px", border: "1px solid rgba(255,255,255,0.5)", borderRadius: 7, fontSize: 12, fontWeight: 700, cursor: "pointer", background: "rgba(255,255,255,0.1)", color: "#fff" }}>👋 Tour</button>
            <div style={{ display: "flex", border: "1px solid rgba(255,255,255,0.3)", borderRadius: 7, overflow: "hidden" }}>
              {[["☀️","light"],["🌙","dark"],["💻","system"]].map(function(opt) {
                var active = darkMode === opt[1];
                return <button key={opt[1]} onClick={function() { setDarkMode(opt[1]); }} title={opt[1].charAt(0).toUpperCase() + opt[1].slice(1)} style={{ padding: "5px 9px", fontSize: 13, border: "none", borderRight: opt[1] !== "system" ? "1px solid rgba(255,255,255,0.2)" : "none", cursor: "pointer", background: active ? "rgba(255,255,255,0.25)" : "rgba(255,255,255,0.05)", color: "#fff", fontWeight: active ? 800 : 400 }}>{opt[0]}</button>;
              })}
            </div>
            <button onClick={function() { if (commissionerUnlocked) { setShowCommissionerPanel(true); } else { setShowCommissionerLogin(true); } }} style={{ padding: "7px 14px", border: "1px solid " + (commissionerUnlocked ? "#fbbf24" : "rgba(255,255,255,0.5)"), borderRadius: 7, fontSize: 12, fontWeight: 700, cursor: "pointer", background: commissionerUnlocked ? "rgba(251,191,36,0.2)" : "rgba(255,255,255,0.1)", color: commissionerUnlocked ? "#fbbf24" : "#fff" }}>{commissionerUnlocked ? "⚙️ Commissioner ●" : "⚙️ Commissioner"}</button>
          </div>
        </div>

        <div style={{ display: "flex", gap: 10, marginTop: 14, flexWrap: "wrap" }}>
          <div style={{ background: "rgba(255,255,255,0.1)", borderRadius: 8, padding: "8px 14px", border: "1px solid rgba(255,255,255,0.2)", display: "flex", gap: 16, alignItems: "center", flexWrap: "wrap", flex: 1 }}>
            <div style={{ fontSize: 11, fontWeight: 800, color: "#fbbf24", textTransform: "uppercase", letterSpacing: "0.05em" }}>📅 Schedule</div>
            <div style={{ display: "flex", gap: 12, fontSize: 11, flex: 1, justifyContent: "space-around" }}>
              {cfgSchedule.filter(function(r) { return r.label && r.date; }).slice().sort(function(a, b) {
                function sortKey(d) {
                  if (!d) return "9999";
                  if (/^\d{4}-\d{2}-\d{2}/.test(d)) return d;
                  var m = d.match(/(\d{1,2})\/(\d{1,2})/);
                  if (m) return "2026-" + String(m[1]).padStart(2,"0") + "-" + String(m[2]).padStart(2,"0");
                  return "9999";
                }
                return sortKey(a.date) < sortKey(b.date) ? -1 : sortKey(a.date) > sortKey(b.date) ? 1 : 0;
              }).map(function(item, i) {
                var colors = ["#86efac","#fb923c","#f9fafb","#c4b5fd","#fda4af","#67e8f9","#fde68a"];
                return <div key={i} style={{ textAlign: "center" }}><div style={{ fontWeight: 700, color: colors[i % colors.length] }}>{cfgLeague.sportEmoji} {formatScheduleDate(item.date)}</div><div style={{ opacity: 0.65 }}>{item.label}</div></div>;
              })}
            </div>
          </div>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: 10, marginTop: 16 }}>
          {Object.entries(cfgTeams).map(function(e) {
            var key = e[0]; var t = e[1];
            var roster = teamRosters[key] || [];
            var ep = roster.filter(function(p) { return !p.pendingEval && p.tier !== null; });
            var avgScore = ep.length ? (ep.reduce(function(s,p) { return s + p.overall; }, 0) / ep.length).toFixed(1) : "-";
            var pitchCount = ep.filter(function(p) { return p.priorityScore >= 4 || p.pitching >= 4; }).length;
            return (
              <div key={key} style={{ background: "rgba(255,255,255,0.1)", borderRadius: 8, padding: "8px 12px", border: "1px solid " + t.color + "44" }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: t.light }}>{t.name} ({t.abbr})</div>
                <div style={{ fontSize: 10, opacity: 0.7, marginBottom: 2 }}>{t.coaches}</div>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, marginTop: 3 }}>
                  <span>{roster.length} players</span>
                  <span>Avg: {avgScore}</span>
                  <span>🔥 {pitchCount}</span>
                </div>
              </div>
            );
          })}
        </div>

        {onTheClock.complete ? (
          <div style={{ marginTop: 14, background: "rgba(255,255,255,0.1)", border: "1px solid rgba(255,255,255,0.3)", borderRadius: 10, padding: "12px 20px", display: "flex", alignItems: "center", justifyContent: "center", gap: 12 }}>
            <div style={{ fontSize: 20 }}>🏁</div>
            <div style={{ fontSize: 16, fontWeight: 800, color: "#fff", letterSpacing: "0.02em" }}>Draft Complete</div>
            <button onClick={function() { setShowRecap(true); }} style={{ marginLeft: 12, padding: "6px 16px", fontSize: 12, fontWeight: 700, background: "var(--color-background-primary)", color: "var(--color-text-primary)", border: "1px solid var(--color-border-secondary)", borderRadius: 7, cursor: "pointer" }}>📊 View Draft Recap</button>
            {myTeam && <button onClick={function() { setActiveTab("email"); setEmailTab("fields"); }} style={{ marginLeft: 8, padding: "6px 16px", fontSize: 12, fontWeight: 700, background: "rgba(255,255,255,0.15)", color: "#fff", border: "1px solid rgba(255,255,255,0.4)", borderRadius: 7, cursor: "pointer" }}>✉️ Welcome Email</button>}
          </div>
        ) : (
          <div style={{ marginTop: 14, background: "rgba(0,0,0,0.25)", border: "2px solid " + (cfgTeams[onTheClock.team] ? cfgTeams[onTheClock.team].color : "#fff"), borderRadius: 10, padding: "10px 20px", display: "flex", alignItems: "center", gap: 16, flexWrap: "wrap" }}>
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", background: cfgTeams[onTheClock.team] ? cfgTeams[onTheClock.team].color : "#6b7280", borderRadius: 8, padding: "6px 16px", minWidth: 80 }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: "rgba(255,255,255,0.75)", textTransform: "uppercase", letterSpacing: "0.08em" }}>On the Clock</div>
              <div style={{ fontSize: 22, fontWeight: 900, color: "#fff", lineHeight: 1.1 }}>{cfgTeams[onTheClock.team] ? cfgTeams[onTheClock.team].name : ""}</div>
            </div>
            <div style={{ display: "flex", gap: 20, fontSize: 13, color: "rgba(255,255,255,0.9)", flex: 1, justifyContent: "space-around" }}>
              <div style={{ textAlign: "center" }}>
                <div style={{ fontSize: 20, fontWeight: 800, color: "#fff" }}>{onTheClock.round}</div>
                <div style={{ fontSize: 10, opacity: 0.7, textTransform: "uppercase", letterSpacing: "0.06em" }}>Round</div>
              </div>
              <div style={{ textAlign: "center" }}>
                <div style={{ fontSize: 20, fontWeight: 800, color: "#fff" }}>{onTheClock.pickNum}</div>
                <div style={{ fontSize: 10, opacity: 0.7, textTransform: "uppercase", letterSpacing: "0.06em" }}>Overall Pick</div>
              </div>
              <div style={{ textAlign: "center" }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: "rgba(255,255,255,0.85)", marginTop: 4 }}>{cfgTeams[onTheClock.team] ? cfgTeams[onTheClock.team].coaches : ""}</div>
                <div style={{ fontSize: 10, opacity: 0.7, textTransform: "uppercase", letterSpacing: "0.06em" }}>Coaches</div>
              </div>
            </div>
          </div>
        )}

        {fullPickLog.length > 0 && (
          <div style={{ marginTop: 10, background: "rgba(0,0,0,0.2)", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 10, overflow: "hidden" }}>
            {/* Collapsed: show last 2 picks + toggle */}
            {!showPickLog && (
              <div>
                {fullPickLog.slice(0, 2).map(function(entry, i) {
                  var tc = entry.tier ? (TIER_COLORS[entry.tier] || TIER_COLORS[11]) : { bg: "#6b7280", text: "#fff" };
                  var teamColor = cfgTeams[entry.team] ? cfgTeams[entry.team].color : "#6b7280";
                  return (
                    <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "6px 14px", borderBottom: i === 0 && fullPickLog.length > 1 ? "1px solid rgba(255,255,255,0.08)" : "none" }}>
                      <span style={{ fontSize: 10, fontWeight: 700, color: "rgba(255,255,255,0.45)", minWidth: 52 }}>{entry.isCD ? "Pre · " + (entry.round ? "R" + entry.round : "—") : "R" + entry.round + "·P" + entry.pickNum}</span>
                      <span style={{ fontSize: 12, fontWeight: 700, color: "#fff", flex: 1 }}>{entry.name}</span>
                      <span style={{ fontSize: 10, fontWeight: 700, padding: "1px 7px", borderRadius: 20, background: tc.bg, color: tc.text }}>{entry.tier ? "T" + entry.tier : "—"}</span>
                      <span style={{ fontSize: 10, fontWeight: 700, color: "#fff", padding: "1px 8px", borderRadius: 20, background: teamColor }}>{cfgTeams[entry.team] ? cfgTeams[entry.team].abbr : entry.team}</span>
                    </div>
                  );
                })}
                <button onClick={function() { setShowPickLog(true); }} style={{ width: "100%", padding: "5px 14px", background: "none", border: "none", borderTop: "1px solid rgba(255,255,255,0.1)", cursor: "pointer", fontSize: 11, fontWeight: 700, color: "rgba(255,255,255,0.5)", textAlign: "center" }}>
                  ▼ Show Full Pick Log ({fullPickLog.length} picks)
                </button>
              </div>
            )}
            {/* Expanded: full scrollable log */}
            {showPickLog && (
              <div>
                <div style={{ maxHeight: 320, overflowY: "auto" }}>
                  {fullPickLog.map(function(entry, i) {
                    var tc = entry.tier ? (TIER_COLORS[entry.tier] || TIER_COLORS[11]) : { bg: "#6b7280", text: "#fff" };
                    var teamColor = cfgTeams[entry.team] ? cfgTeams[entry.team].color : "#6b7280";
                    return (
                      <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "7px 14px", borderBottom: "1px solid rgba(255,255,255,0.07)", background: i === 0 ? "rgba(255,255,255,0.06)" : "transparent" }}>
                        <span style={{ fontSize: 10, fontWeight: 700, color: "rgba(255,255,255,0.45)", minWidth: 52 }}>{entry.isCD ? "Pre · " + (entry.round ? "R" + entry.round : "—") : "R" + entry.round + "·P" + entry.pickNum}</span>
                        <span style={{ fontSize: 12, fontWeight: 700, color: "#fff", flex: 1 }}>{entry.name}</span>
                        {entry.isCD && <span style={{ fontSize: 10, fontWeight: 600, color: "#67e8f9", fontStyle: "italic" }}>PA</span>}
                        <span style={{ fontSize: 10, fontWeight: 700, padding: "1px 7px", borderRadius: 20, background: tc.bg, color: tc.text }}>{entry.tier ? "T" + entry.tier : "—"}</span>
                        <span style={{ fontSize: 10, fontWeight: 700, color: "#fff", padding: "1px 8px", borderRadius: 20, background: teamColor }}>{cfgTeams[entry.team] ? cfgTeams[entry.team].abbr : entry.team}</span>
                      </div>
                    );
                  })}
                </div>
                <button onClick={function() { setShowPickLog(false); }} style={{ width: "100%", padding: "5px 14px", background: "none", border: "none", borderTop: "1px solid rgba(255,255,255,0.1)", cursor: "pointer", fontSize: 11, fontWeight: 700, color: "rgba(255,255,255,0.5)", textAlign: "center" }}>
                  ▲ Hide Pick Log
                </button>
              </div>
            )}
          </div>
        )}

        {nextBestPick && (
          <div style={{ marginTop: 14, background: "rgba(245,158,11,0.15)", border: "1px solid rgba(245,158,11,0.5)", borderRadius: 10, padding: "10px 16px", display: "flex", alignItems: "center", gap: 16, flexWrap: "wrap" }}>
            <div style={{ fontSize: 12, fontWeight: 800, color: "#fbbf24", letterSpacing: "0.05em", textTransform: "uppercase", whiteSpace: "nowrap" }}>⭐ Next Best Available</div>
            <div style={{ flex: 1, minWidth: 180 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 2 }}>
                <div style={{ fontSize: 17, fontWeight: 800, color: "#fff" }}>{nextBestPick.name}</div>
                <span style={{ fontSize: 10, fontWeight: 700, padding: "2px 8px", borderRadius: 20, background: nextBestPick.needPriority ? "#f59e0b" : "#6366f1", color: "#fff" }}>{nextBestPick.needPriority ? "🎯 " + (nextBestPick.priLabel || "Priority") + " Priority" : "⚖ Balanced Mode"}</span>
              </div>
              <div style={{ fontSize: 11, color: "rgba(255,255,255,0.7)" }}>Tier {nextBestPick.tier}&nbsp;&middot;&nbsp;Score {nextBestPick.overall}{nextBestPick._priScore >= 4 && <span style={{ marginLeft: 8, color: "#fbbf24", fontWeight: 700 }}>🔥 {cfgStations[cfgPriorityIdx] || "Priority"} ({nextBestPick._priScore})</span>}</div>
              <div style={{ fontSize: 11, color: "rgba(255,255,255,0.9)", marginTop: 5, fontStyle: "italic", lineHeight: 1.4 }}>{nextBestPick.rationale}</div>
            </div>
            <div style={{ display: "flex", gap: 12, fontSize: 12, color: "rgba(255,255,255,0.85)" }}>
              {cfgStations.map(function(label, i) {
                var scores = [nextBestPick.fieldingG, nextBestPick.fieldingF, nextBestPick.throwing, nextBestPick.hitting, nextBestPick.pitching];
                var val = scores[i];
                var isPri = i === cfgPriorityIdx && val >= 4;
                return <div key={label} style={{ textAlign: "center" }}><div style={{ fontSize: 15, fontWeight: 800, color: isPri ? "#fbbf24" : "#fff" }}>{val}</div><div style={{ fontSize: 10, opacity: 0.65 }}>{label}</div></div>;
              })}
            </div>
            <div style={{ background: TIER_COLORS[nextBestPick.tier] && TIER_COLORS[nextBestPick.tier].bg, color: "#fff", fontSize: 12, fontWeight: 800, padding: "4px 14px", borderRadius: 20 }}>T{nextBestPick.tier} &mdash; {TIER_COLORS[nextBestPick.tier] && TIER_COLORS[nextBestPick.tier].label}</div>
          </div>
        )}
      </div>

      <div style={{ background: "var(--color-background-primary)", borderBottom: "1px solid var(--color-border-tertiary)", padding: "0 28px" }}>
        {/* Tab bar row — full width, horizontally scrollable */}
        <div style={{ position: "relative" }}>
          <div className="tab-scroll-bar" style={{ display: "flex", gap: 4, overflowX: "auto", WebkitOverflowScrolling: "touch", padding: "8px 0 0" }}>
            <button style={btnStyle(activeTab === "board")}    onClick={function() { setActiveTab("board");    }}>📋 Draft Board</button>
            <button style={btnStyle(activeTab === "teams")}    onClick={function() { setActiveTab("teams");    }}>👥 Team View</button>
            <button style={btnStyle(activeTab === "scouting")} onClick={function() { setActiveTab("scouting"); }}>🏅 Scouting</button>
            <button style={btnStyle(activeTab === "pickorder")} onClick={function() { setActiveTab("pickorder"); }}>🔢 Pick Order</button>
            <button style={btnStyle(activeTab === "analytics")} onClick={function() { setActiveTab("analytics"); }}>📊 Analytics</button>
            <button style={btnStyle(activeTab === "notes")}    onClick={function() { setActiveTab("notes"); setTimeout(updateEditorFromStore, 0); }} disabled={!myTeam}>📝 Notes</button>
            <button style={btnStyle(activeTab === "email")}    onClick={function() { setActiveTab("email"); setEmailTab("fields"); }} disabled={!myTeam}>✉️ Email</button>
            <button style={btnStyle(activeTab === "guide")}    onClick={function() { setActiveTab("guide");    }}>📖 Guide</button>
            <button style={btnStyle(activeTab === "whatsnew")} onClick={function() { setActiveTab("whatsnew"); }}>📋 What's New</button>
          </div>
          <div style={{ position: "absolute", right: 0, top: 0, bottom: 0, width: 32, background: "linear-gradient(to right, transparent, var(--color-background-primary))", pointerEvents: "none" }} />
        </div>
        {/* Action buttons row */}
        <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", padding: "8px 0" }}>
          <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
            <span style={{ fontSize: 12, color: "var(--color-text-tertiary)" }}>My Team:</span>
            {Object.keys(cfgTeams).map(function(t) { return <button key={t} onClick={function() { setMyTeam(t); setMyTeamSet(true); setTimeout(function() { updateEditorFromStore(t); }, 0); }} style={{ padding: "5px 12px", border: "none", borderRadius: 6, fontSize: 12, fontWeight: 700, cursor: "pointer", background: myTeam === t && myTeamSet ? cfgTeams[t].color : "var(--color-background-secondary)", color: myTeam === t && myTeamSet ? "#fff" : "var(--color-text-secondary)" }}>{cfgTeams[t].abbr}</button>; })}
            <div style={{ width: 1, height: 22, background: "var(--color-border-tertiary)" }} />
            {boardArchived && <span style={{ fontSize: 11, fontWeight: 800, background: "#1e1b4b", color: "#fff", padding: "3px 10px", borderRadius: 20, border: "1px solid #4338ca" }}>📦 Season Archived — Read Only</span>}
            {!boardArchived && boardLocked && <span style={{ fontSize: 11, fontWeight: 800, background: "var(--color-surface-warning-alt)", color: "var(--color-text-primary)", padding: "3px 10px", borderRadius: 20, border: "1px solid #f59e0b" }}>🔒 Board Locked</span>}
            <button onClick={function() { if (!boardLocked && !boardArchived) { setShowAutoDraftConfirm(true); } }} disabled={boardLocked || boardArchived} style={{ padding: "5px 12px", border: "1px solid " + (boardLocked || boardArchived ? "var(--color-border-secondary)" : "#7c3aed"), borderRadius: 6, fontSize: 12, fontWeight: 700, cursor: boardLocked || boardArchived ? "not-allowed" : "pointer", background: "var(--color-background-primary)", color: boardLocked || boardArchived ? "#9ca3af" : "#7c3aed" }}>⚡ Auto Draft</button>
            <button onClick={handleUndo} disabled={boardLocked || boardArchived || draftHistory.length === 0} style={{ padding: "5px 12px", border: "1px solid " + (boardLocked || boardArchived || draftHistory.length === 0 ? "#d1d5db" : "#0891b2"), borderRadius: 6, fontSize: 12, fontWeight: 700, cursor: boardLocked || boardArchived || draftHistory.length === 0 ? "not-allowed" : "pointer", background: "var(--color-background-primary)", color: boardLocked || boardArchived || draftHistory.length === 0 ? "#9ca3af" : "#0891b2" }}>↩ Undo{draftHistory.length > 0 ? " (" + draftHistory.length + ")" : ""}</button>
            <button onClick={function() { if (!boardLocked && !boardArchived) { setShowResetConfirm(true); } }} disabled={boardLocked || boardArchived} style={{ padding: "5px 12px", border: "1px solid " + (boardLocked || boardArchived ? "var(--color-border-secondary)" : "#dc2626"), borderRadius: 6, fontSize: 12, fontWeight: 700, cursor: boardLocked || boardArchived ? "not-allowed" : "pointer", background: "var(--color-background-primary)", color: boardLocked || boardArchived ? "#9ca3af" : "#dc2626" }}>↺ Reset Draft</button>
            {!boardArchived && <button onClick={function() { setBoardLocked(function(l) { return !l; }); }} style={{ padding: "5px 12px", border: "1px solid " + (boardLocked ? "#16a34a" : "#6b7280"), borderRadius: 6, fontSize: 12, fontWeight: 700, cursor: "pointer", background: boardLocked ? "#dcfce7" : "#fff", color: boardLocked ? "#16a34a" : "#6b7280" }}>{boardLocked ? "🔓 Unlock Board" : "🔒 Lock Board"}</button>}
          </div>
        </div>
        {/* Row 2: Filters — only shown on Draft Board tab */}
        {activeTab === "board" && (
        <div>
        {!myTeamSet && activePlayers.length > 0 && (
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12, background: "var(--color-surface-warning-alt)", border: "1px solid #fde68a", borderRadius: 10, padding: "10px 16px", marginBottom: 12 }}>
            <div style={{ fontSize: 13, color: "var(--color-text-primary)", fontWeight: 600 }}>

                var rounds = Object.keys(byRound).map(Number).sort(function(a,b) { return a - b; });
                return (
                  <div key={key} className="team-card" style={{ background: "var(--color-background-primary)", borderRadius: 12, border: "2px solid " + team.color, overflow: "hidden" }}>
                    <div style={{ background: team.color, padding: "10px 16px", color: "#fff" }}>
                      <div style={{ fontSize: 14, fontWeight: 800 }}>{team.name} Roster</div>
                      <div style={{ fontSize: 11, opacity: 0.85 }}>{team.coaches}</div>
                    </div>
                    <div style={{ padding: 12 }}>
                      {rounds.map(function(r) {
                        return (
                          <div key={r}>
                            <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: "0.08em", textTransform: "uppercase", color: team.color, borderBottom: "2px solid " + team.color + "22", paddingBottom: 3, marginBottom: 4, marginTop: r === rounds[0] ? 0 : 10 }}>
                              {r === 0 ? "Pre-Draft" : "Round " + r}
                            </div>
                            {byRound[r].map(function(p) {
                              var tc = p.pendingEval ? { bg: "#9ca3af", text: "#fff" } : (TIER_COLORS[p.tier] || TIER_COLORS[11]);
                              var isPitcher = !p.pendingEval && (p.priorityScore >= 4 || p.pitching >= 4);
                              var isCD = !!activePreAssigned[p.name];
                              return (
                                <div key={p.name} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "4px 6px", borderRadius: 5, marginBottom: 2, background: "var(--color-background-secondary)" }}>
                                  <div>
                                    <div style={{ fontSize: 12, fontWeight: 600, color: "var(--color-text-primary)" }}>
                                      <span onClick={function(e) { e.stopPropagation(); setModalPlayer(p.name); }} style={{ textDecoration: "underline", textDecorationColor: "#6366f1", textUnderlineOffset: "3px", cursor: "pointer" }}>{p.name}</span>
                                      {isPitcher ? " 🔥" : ""}
                                      {isCD ? " ⭐" : ""}
                                      {isCoachedBy(playerNotesStore, myTeam, p.name) ? " 🏅" : ""}
                                    </div>
                                    {drafted[p.name] && drafted[p.name].positions && drafted[p.name].positions.length > 0 && (
                                      <div style={{ display: "flex", gap: 3, flexWrap: "wrap", marginTop: 2 }}>
                                        {drafted[p.name].positions.map(function(pos) {
                                          return <span key={pos} style={{ fontSize: 10, fontWeight: 700, padding: "1px 5px", borderRadius: 4, background: "var(--color-background-secondary)", color: "var(--color-text-secondary)", border: "1px solid var(--color-border-secondary)" }}>{pos}</span>;
                                        })}
                                      </div>
                                    )}
                                    <div style={{ fontSize: 10, color: "var(--color-text-tertiary)" }}>
                                      Age {p.age} · Score {p.overall} · Pitch {p.pitching} · Bat {p.hitting}
                                    </div>
                                  </div>
                                  <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 3 }}>
                                    <span style={{ background: tc.bg, color: tc.text, fontSize: 10, fontWeight: 700, padding: "2px 7px", borderRadius: 20, whiteSpace: "nowrap" }}>T{p.tier}</span>
                                    {!p.pendingEval && projectedRounds[p.name] && <span style={{ background: "var(--color-surface-info)", color: "#0369a1", fontSize: 10, fontWeight: 700, padding: "2px 7px", borderRadius: 20, whiteSpace: "nowrap" }}>PR {projectedRounds[p.name]}</span>}
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Footer */}
            <div style={{ textAlign: "center", marginTop: 24, fontSize: 11, color: "var(--color-text-tertiary)" }}>
              DraftKit {VERSION} · Designed &amp; Built by Ryan Brook · Powered by Claude
            </div>
          </div>
        </div>
      )}

      <PlayerModal playerName={modalPlayer} drafted={drafted} onClose={function() { setModalPlayer(null); }} myTeam={myTeam} playerNotesStore={playerNotesStore} onPlayerNoteChange={handlePlayerNoteChange} teams={cfgTeams} leagueLabel={cfgLeague.sportEmoji + " " + cfgLeague.seasonName + " " + cfgLeague.season} stations={cfgStations} priorityIdx={cfgPriorityIdx} positions={cfgPositions} players={activePlayers} boardArchived={boardArchived} onCoachToggle={handleCoachToggle} projectedRounds={projectedRounds} preAssigned={modalPlayer ? (activePreAssigned[modalPlayer] || null) : null} />

      <div style={{ textAlign: "center", padding: "16px 28px", borderTop: "1px solid var(--color-border-tertiary)", fontSize: 11, color: "var(--color-text-tertiary)" }}>
        Designed &amp; Built by Ryan Brook (<a href="mailto:ryan@brook-creative.com" style={{ color: "var(--color-text-tertiary)" }}>ryan@brook-creative.com</a>) &middot; Powered by Claude &middot; Demo Board &middot; <a href="https://github.com/rebrook/draftkit" target="_blank" style={{ color: "var(--color-text-tertiary)" }}>GitHub</a> &middot; <a href="/logs" target="_blank" style={{ color: "var(--color-text-tertiary)" }}>Server Logs</a>
      </div>
      {showTutorial && <TutorialModal onClose={function() { setShowTutorial(false); }} />}
      {showCommissionerLogin && (
        <CommissionerPasswordModal
          onSuccess={function(pw) { setCommissionerUnlocked(pw); setShowCommissionerLogin(false); setShowCommissionerPanel(true); }}
          onClose={function() { setShowCommissionerLogin(false); }}
        />
      )}
      {showCommissionerPanel && (
        <CommissionerPanel
          boardId={BOARD_ID}
          initialConfig={commissionerConfig}
          onClose={function() { setShowCommissionerPanel(false); }}
          onSave={function(cfg) { setCommissionerConfig(cfg); }}
          commissionerPassword={commissionerUnlocked}
          boardArchived={boardArchived}
          boardLocked={boardLocked}
          onArchivedChange={function(archived) { setBoardArchived(archived); }}
          onPositionRemoved={function(pos) {
            setDrafted(function(d) {
              var next = Object.assign({}, d);
              Object.keys(next).forEach(function(name) {
                if (next[name].positions && next[name].positions.indexOf(pos) !== -1) {
                  next[name] = Object.assign({}, next[name], { positions: next[name].positions.filter(function(p) { return p !== pos; }) });
                }
              });
              return next;
            });
          }}
        />
      )}
    </div>
  );
}
// DarkModeWrapper provides ThemeContext above DraftBoard so all children can consume it
function DarkModeWrapper() {
  var [darkMode, setDarkMode] = React.useState(function() {
    try { return localStorage.getItem("draftboard-theme") || "system"; } catch(e) { return "system"; }
  });
  React.useEffect(function() {
    var root = document.documentElement;
    var mq = window.matchMedia("(prefers-color-scheme: dark)");
    function apply(mode) {
      if (mode === "dark") root.setAttribute("data-theme", "dark");
      else if (mode === "light") root.setAttribute("data-theme", "light");
      else root.removeAttribute("data-theme");
      try { localStorage.setItem("draftboard-theme", mode); } catch(e) {}
    }
    apply(darkMode);
    function onSystemChange() { if (darkMode === "system") apply("system"); }
    mq.addEventListener("change", onSystemChange);
    return function() { mq.removeEventListener("change", onSystemChange); };
  }, [darkMode]);
  return (
    <ThemeContext.Provider value={darkMode}>
      <DraftBoard darkMode={darkMode} setDarkMode={setDarkMode} />
    </ThemeContext.Provider>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<DarkModeWrapper />);
</script>
</body>
</html>
